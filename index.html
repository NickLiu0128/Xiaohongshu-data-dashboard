<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选题复盘看板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f4; color: #1c1917; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 15px; }
  .header { background: #fff; border-bottom: 3px solid #1c1917; }
  .header-in { max-width: 1100px; margin: 0 auto; padding: 20px; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 26px; }
  .meta { font-size: 14px; color: #44403c; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 22px 20px 40px; display: flex; flex-direction: column; gap: 20px; }
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 700px) { .cards { grid-template-columns: repeat(2, 1fr); } }
  .card { background: #fff; border-radius: 12px; padding: 16px 18px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border-top: 3px solid #1c1917; }
  .card .lab { font-size: 13px; color: #44403c; margin-bottom: 5px; font-weight: 500; }
  .card .val { font-size: 25px; font-weight: 700; }
  .card .sub { font-size: 13px; color: #57534e; margin-top: 3px; }
  .panel { background: #fff; border-radius: 12px; padding: 20px 22px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .sec { font-size: 17px; font-weight: 700; border-left: 4px solid #4A6FA5; padding-left: 9px; }
  .panel-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .toggle { display: flex; border: 1px solid #e7e5e4; border-radius: 8px; overflow: hidden; font-size: 14px; }
  .toggle button { padding: 7px 14px; border: none; background: #fff; color: #57534e; cursor: pointer; font-size: 14px; }
  .toggle button.on { background: #4A6FA5; color: #fff; }
  .insight { display: flex; gap: 9px; font-size: 15px; line-height: 1.75; margin-top: 9px; }
  .insight b { flex-shrink: 0; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-top: 12px; font-size: 14px; color: #44403c; }
  .legend-cap { color: #78716c; }
  .legend-item { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .scatter-tip-note { margin-top: 10px; font-size: 14px; color: #44403c; background: #f5f7fa; border-left: 3px solid #4A6FA5; padding: 8px 12px; border-radius: 6px; line-height: 1.6; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; font-size: 14px; align-items: center; }
  .pill { padding: 5px 12px; border-radius: 999px; border: 1.5px solid; background: transparent; cursor: pointer; font-size: 14px; }
  .pill.dim { opacity: .3; }
  .hint { color: #57534e; font-size: 13px; }
  .tbl-note { margin-top: 8px; line-height: 1.7; }
  .chart { width: 100%; height: 280px; margin-top: 12px; }
  .chart.tall { height: 320px; }
  .chart.short { height: 220px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 12px; min-width: 680px; }
  th { text-align: left; color: #57534e; font-weight: 500; padding: 9px 10px 9px 0; border-bottom: 1px solid #e7e5e4; }
  td { padding: 9px 10px 9px 0; border-bottom: 1px solid #f0efee; }
  tr.row { cursor: pointer; }
  tr.row:hover td { background: #fafaf9; }
  .tag { color: #fff; font-size: 12px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .ttl { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .caret { color: #a8a29e; font-size: 12px; }
  .tbl-wrap { overflow-x: auto; }
  .detail-row td { background: #f8fafc; }
  .detail { padding: 12px 14px; font-size: 14px; }
  .detail-title { font-weight: 700; margin-bottom: 8px; white-space: normal; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 6px 16px; color: #44403c; }
  .open-link { display: inline-block; margin-top: 10px; color: #4A6FA5; font-weight: 600; text-decoration: none; }
  .open-link:hover { text-decoration: underline; }
  .edit-bar { display: flex; gap: 8px; }
  .btn { padding: 7px 14px; border-radius: 8px; border: 1px solid #d6d3d1; background: #fff; color: #44403c; cursor: pointer; font-size: 14px; }
  .btn:hover { background: #fafaf9; }
  .btn.primary { background: #4A6FA5; border-color: #4A6FA5; color: #fff; }
  .btn.primary:hover { background: #3d5d8c; }
  input.num { width: 84px; padding: 5px 7px; border: 1px solid #d6d3d1; border-radius: 6px; font-size: 14px; }
  input.num.sm { width: 64px; }
  .foot { text-align: center; font-size: 13px; color: #78716c; }
  .tooltip-box { background: #fff; border: 1px solid #e7e5e4; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.1); padding: 11px 13px; font-size: 13.5px; max-width: 250px; }
  .tooltip-box .t { font-weight: 700; margin-bottom: 3px; }
  .tooltip-box .g { color: #57534e; }
</style>
</head>
